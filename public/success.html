<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Order Berhasil • Mawar Parfum</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    /* ===== Success Page (elegant + mewah, tetap nyatu sama style.css) ===== */
    .success-wrap{padding:54px 16px;max-width:820px;margin:0 auto}
    .success-card{
      background:linear-gradient(180deg, rgba(122,41,70,.06), rgba(231,192,107,.06));
      border:1px solid var(--line);
      border-radius:22px;
      box-shadow:var(--shadow);
      padding:26px 22px;
      position:relative;
      overflow:hidden;
    }
    .success-card:before{
      content:"";
      position:absolute;inset:-2px;
      background:radial-gradient(800px 220px at 20% 0%, rgba(231,192,107,.25), transparent 60%),
                 radial-gradient(700px 240px at 90% 10%, rgba(122,41,70,.18), transparent 62%);
      pointer-events:none;
      filter:blur(.2px);
      opacity:.9;
    }
    .success-inner{position:relative;z-index:1}

    .success-top{
      display:flex;align-items:center;gap:14px;flex-wrap:wrap;
      margin:0 0 12px;
    }
    .badge-ok{
      width:44px;height:44px;border-radius:14px;
      display:grid;place-items:center;
      background:linear-gradient(180deg, rgba(231,192,107,.30), rgba(231,192,107,.12));
      border:1px solid rgba(231,192,107,.55);
      box-shadow:0 14px 40px rgba(0,0,0,.08);
      font-size:20px;
    }
    .success-title{
      margin:0;
      font-size:26px;
      letter-spacing:.06em;
      text-transform:uppercase;
      line-height:1.15;
    }
    .success-sub{
      margin:0 0 18px;
      color:var(--muted);
      line-height:1.7;
    }

    .code-box{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      padding:14px 14px;
      border-radius:16px;
      background:#fff;
      border:1px solid var(--line);
    }
    .code-left{display:flex;flex-direction:column;gap:4px}
    .code-label{
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:var(--muted);
    }
    .code{
      font-size:18px;
      font-weight:800;
      letter-spacing:.18em;
      color:var(--text);
      word-break:break-all;
    }

    .btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
    .btn{
      appearance:none;border:none;cursor:pointer;
      border-radius:16px;
      padding:12px 14px;
      font-weight:800;
      letter-spacing:.10em;
      text-transform:uppercase;
      font-size:12px;
      display:inline-flex;align-items:center;justify-content:center;gap:8px;
      transition:transform .12s ease, box-shadow .12s ease, opacity .12s ease;
      user-select:none;
    }
    .btn:active{transform:translateY(1px)}
    .btn-primary{
      background:linear-gradient(180deg, rgba(122,41,70,1), rgba(90,22,50,1));
      color:#fff;
      box-shadow:0 14px 40px rgba(122,41,70,.18);
    }
    .btn-ghost{
      background:rgba(0,0,0,.02);
      border:1px solid var(--line);
      color:var(--text);
    }
    .btn:hover{opacity:.95}

    .note{
      margin-top:14px;
      padding:12px 14px;
      border-radius:16px;
      border:1px dashed rgba(231,192,107,.65);
      background:rgba(231,192,107,.10);
      color:var(--text);
      line-height:1.7;
    }
    .note b{color:var(--text)}
    .tiny{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
      line-height:1.6;
    }

    /* Dark mode kalau style.css punya body admin/dark (biar tetap elegan) */
    body.admin .success-card, body.dark .success-card{
      border-color:rgba(255,255,255,.12);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    }
    body.admin .code-box, body.dark .code-box{
      background:rgba(255,255,255,.06);
      border-color:rgba(255,255,255,.14);
    }
    body.admin .btn-ghost, body.dark .btn-ghost{
      background:rgba(255,255,255,.05);
      border-color:rgba(255,255,255,.14);
      color:inherit;
    }
    body.admin .note, body.dark .note{
      border-color:rgba(231,192,107,.45);
      background:rgba(231,192,107,.12);
    }
  </style>
</head>

<body class="site">
  <div class="success-wrap">
    <div class="success-card">
      <div class="success-inner">
        <div class="success-top">
          <div class="badge-ok">✓</div>
          <h1 class="success-title">Order sukses</h1>
        </div>

        <p class="success-sub">
          Terima kasih! Pesanan kamu sudah kami terima dan sedang diproses.
        </p>

        <div class="code-box">
          <div class="code-left">
            <div class="code-label">Kode Order</div>
            <div class="code" id="orderCode">-</div>
          </div>
          <button class="btn btn-ghost" type="button" onclick="copyOrder()">
            📋 COPY
          </button>
        </div>

        <div class="note">
          ✅ </b>.Admin sudah menerima ORDERAN kamu dan Admin Segera menghubungin <b>kontak yang telah kamu berikan</b>.
          Simpan kode order untuk memudahkan pengecekan status.
        </div>

        <div class="btn-row">
          <a class="btn btn-primary" href="/">🏠 Kembali ke Home</a>
          <a class="btn btn-ghost" href="/checkout.html">🧾 Lihat Checkout</a>
        </div>

        <div class="tiny" id="timeInfo"></div>
      </div>
    </div>
  </div>

  <script>
    const q = new URLSearchParams(location.search);
    const code = q.get("order") || "-";
    document.getElementById("orderCode").textContent = code;

    // info kecil waktu (opsional, bikin lebih "premium")
    try{
      const now = new Date();
      document.getElementById("timeInfo").textContent =
        "Tercatat: " + now.toLocaleString("id-ID", { dateStyle:"full", timeStyle:"short" });
    }catch(e){}

    function copyOrder(){
      if(!code || code === "-") return;
      navigator.clipboard.writeText(code).then(()=>{
        const btn = event?.target;
        if(btn){
          const old = btn.textContent;
          btn.textContent = "✅ COPIED";
          setTimeout(()=>btn.textContent = old, 1200);
        }
      }).catch(()=>{});
    }
  </script>
</body>
</html>
